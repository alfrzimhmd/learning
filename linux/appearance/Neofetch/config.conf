# =========================
# INFO LAYOUT
# =========================
print_info() {

    # Colors
    cR="$(color 1)"
    cG="$(color 2)"
    cA="$(color 3)"
    cB="$(color 4)"
    cP="$(color 5)"
    cC="$(color 6)"
    cW="$(color 7)"
    c0="$(color reset)"

    # ================= TITLE =================
    prin "${cA}─────────────────────────────────────${cA}"
    prin "${cG}││               ${cC}All${cR}@${cC}Ubuntu - System Overview"
    prin "${cA}─────────────────────────────────────${cA}"

    # ================= System =================
    prin "${cA}─────────────────────────────────────${cA}"
    info "OS" distro
    info "Kernel" kernel
    info "Host" model

    # ================= Desktop =================
    prin "${cA}─────────────────────────────────────${cA}"
    info "DE" de
    info "Terminal" term
    info "Shell" shell

    # ================= Hardware =================
    prin "${cA}─────────────────────────────────────${cA}"
    info "Memory" memory
    info "Disk" disk

    # ================= Network & Power =================
    prin "${cA}─────────────────────────────────────${cA}"
    info "IP" local_ip
    info "Battery" battery
    info "Uptime" uptime
    
    info cols
    
    # ================= Tools Box =================

    tools=(
        "Git" "Nmap" "Curl" "Wget"
        "Python3" "SqlMap" "Java"
        "Flutter" "Dirb" "Burp"
    )

    cols=4
    col_width=9

    # Lebar presisi
    content_width=$((cols * col_width + (cols - 1) * 3))
    total_width=$((content_width + 4))

    # Random color
    rand_color() {
        colors=(1 2 3 4 5 6)
        echo "$(color ${colors[$RANDOM % ${#colors[@]}]})"
    }

    # ===== TOP BORDER =====
    printf "${cA}╔"
    printf '═%.0s' $(seq 1 $((total_width - 2)))
    printf "╗\n"

    # ===== TITLE (center manual fix width, tanpa emoji biar lurus) =====
    title="INSTALLED TOOLS"
    padding=$(( (total_width - 2 - ${#title}) / 2 ))

    printf "${cA}║"
    printf "%*s" $padding ""
    printf "${cC}%s" "$title"
    printf "%*s" $((total_width - 2 - padding - ${#title})) ""
    printf "${cA}║\n"

    # ===== MIDDLE BORDER =====
    printf "${cA}╠"
    printf '═%.0s' $(seq 1 $((total_width - 2)))
    printf "╣\n"

    # ===== CONTENT =====
    for ((i=0; i<${#tools[@]}; i++)); do

        if (( i % cols == 0 )); then
            printf "${cA}║ "
        fi

        rc=$(rand_color)
        printf "${rc}%-${col_width}s${cA}" "${tools[i]}"

        if (( (i+1) % cols == 0 )); then
            printf " ║\n"
        else
            printf " │ "
        fi
    done

    # ===== FILL EMPTY COLUMNS =====
    remainder=$(( ${#tools[@]} % cols ))

    if (( remainder != 0 )); then
        for ((i=remainder; i<cols; i++)); do
            printf "%-${col_width}s" " "
            if (( i < cols-1 )); then
                printf " │ "
            fi
        done
        printf " ║\n"
    fi

    # ===== BOTTOM BORDER =====
    printf "${cA}╚"
    printf '═%.0s' $(seq 1 $((total_width - 2)))
    printf "╝\n"

}
    #info "CPU" cpu
    #info "GPU" gpu
    #info "WM" wm
    #info "Init" init


# =========================
# BASIC SYSTEM INFO
# =========================
title_fqdn="off"
kernel_shorthand="on"
distro_shorthand="off"
os_arch="on"
uptime_shorthand="on"

# =========================
# MEMORY
# =========================
memory_percent="off"
memory_unit="mib"

# =========================
# PACKAGES
# =========================
package_managers="on"

# =========================
# SHELL
# =========================
shell_path="off"
shell_version="on"

# =========================
# CPU
# =========================
speed_type="bios_limit"
speed_shorthand="off"
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="off"   # C / F / off

# =========================
# GPU
# =========================
gpu_brand="on"
gpu_type="all"   # all / dedicated / integrated

# =========================
# DISPLAY
# =========================
refresh_rate="off"
de_version="on"

# =========================
# DISK
# =========================
disk_show=('/')
disk_subtitle="mount"
disk_percent="on"

# =========================
# MUSIC (OPTIONAL)
# =========================
music_player="auto"
song_format="%artist% - %album% - %title%"
song_shorthand="off"

# =========================
# COLORS & TEXT
# =========================
colors=(1 4 2 4 8 7)
bold="on"
underline_enabled="on"
underline_char="="
separator=":"

# =========================
# COLOR BLOCKS
# =========================
color_blocks="on"
block_range=(0 15)
block_width=3
block_height=1
col_offset="auto"

# =========================
# PROGRESS BAR (OPTIONAL)
# =========================
bar_char_elapsed="-"
bar_char_total="="
bar_border="on"
bar_length=15
bar_color_elapsed="distro"
bar_color_total="distro"

cpu_display="off"
memory_display="off"
battery_display="off"
disk_display="off"

# =========================
# ASCII / IMAGE
# =========================
image_backend="ascii"
image_source="auto"
ascii_distro="Ubuntu" 
ascii_colors=(4 7)
ascii_bold="on"

# =========================
# IMAGE OPTIONS (ASCII SAFE)
# =========================
image_loop="off"
image_size="auto"
gap=3
xoffset=0
yoffset=0

# =========================
# MISC
# =========================
stdout="off"
